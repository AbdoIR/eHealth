apiVersion: apps/v1
kind: Deployment
metadata:
  name: meddesk-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meddesk
  template:
    metadata:
      labels:
        app: meddesk
    spec:
      containers:
        - name: meddesk
          image: abdoir192/meddesk:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"